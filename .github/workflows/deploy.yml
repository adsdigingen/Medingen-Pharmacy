name: Medingen ERP CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # Job 1: Linting, Formatting, and Compile Tests
  # ==========================================
  build-and-test:
    name: Lint, Test, and Build Workspace
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: SecureTestPassword123
          POSTGRES_DB: medingen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Generate Prisma DB Bindings
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://postgres:SecureTestPassword123@localhost:5432/medingen_test?schema=public"

      - name: Compile Cloud Server
        run: npm run cloud:build

      - name: Compile Desktop Modules
        run: npm run desktop:build

  # ==========================================
  # Job 2: Production Container Verification
  # ==========================================
  docker-verify:
    name: Verify Docker Container Build
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Cloud API Docker Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/cloud/Dockerfile
          push: false
          tags: medingen/cloud-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
